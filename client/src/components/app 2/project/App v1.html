<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>smbx.ai · internal app</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css?v=3" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="cards.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="canvas.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>

<script type="text/babel">
/* ═══════════════════════════════════════════════════════════
   Top-level app — mode toggle, state, tweaks panel
   ═══════════════════════════════════════════════════════════ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "desktop",
  "rail": "expanded",
  "density": "comfortable",
  "browseMode": false,
  "workWidth": "normal",
  "canvasShown": true,
  "chatShown": true
}/*EDITMODE-END*/;

function loadState() {
  try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('smbx-app') || '{}') }; }
  catch { return TWEAK_DEFAULTS; }
}
function saveState(s) { try { localStorage.setItem('smbx-app', JSON.stringify(s)); } catch {} }

function App() {
  const [state, setState] = React.useState(loadState);
  const set = patch => setState(s => { const n = { ...s, ...patch }; saveState(n); return n; });

  /* Viewport width → auto-collapse secondary panes */
  const [vw, setVw] = React.useState(() => window.innerWidth);
  React.useEffect(() => {
    const onR = () => setVw(window.innerWidth);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  const tooNarrowForWork = vw < 1280;
  const tooNarrowForChat = vw < 1040;

  /* Desktop state */
  const [activeId, setActiveId] = React.useState('atlas');
  const [activeStage, setActiveStage] = React.useState(null);
  const [messages, setMessages] = React.useState(() => window.CHAT_SEEDS['atlas'] || []);
  const [typing, setTyping] = React.useState(false);
  const [tabs, setTabs] = React.useState([
    { id: 'atlas-rundown', kind: 'rundown', label: 'Atlas · Rundown', deal: window.DEALS[0] },
    { id: 'atlas-dd',      kind: 'dd',      label: 'Atlas · DD',      deal: window.DEALS[0] },
    { id: 'compare',       kind: 'compare', label: 'Portfolio compare', deal: null },
  ]);
  const [activeTabId, setActiveTabId] = React.useState('atlas-rundown');
  const [workHidden, setWorkHidden] = React.useState(false);

  /* Edit-mode wiring */
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  React.useEffect(() => {
    const onMsg = e => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const activeDeal = React.useMemo(() => {
    if (activeId === 'compare') return null;
    return window.DEALS.find(d => d.id === activeId) || null;
  }, [activeId]);

  const handleSelectDeal = (id, kindHint) => {
    setActiveId(id);
    setActiveStage(null);
    setMessages(window.CHAT_SEEDS[id] || [
      { who: 'y', text: id === 'compare'
          ? 'Portfolio compare ready. 3 live deals stack-ranked below.'
          : `Switched to <strong>${(window.DEALS.find(d => d.id === id) || {}).name || id}</strong>. What do you want to work on?`,
        cards: id === 'compare' ? ['compare'] : null },
    ]);
    if (kindHint) openArtifact(id, kindHint);
  };

  const handleNewChat = () => {
    setActiveId('new');
    setMessages([
      { who: 'y', text: 'Hi — I\u2019m <strong>Yulia</strong>. Tell me what you\u2019re looking for. Industry, geography, check size, or paste a CIM.', cards: null },
    ]);
  };

  const openArtifact = (dealId, kind) => {
    const deal = dealId === 'compare' ? null : window.DEALS.find(d => d.id === dealId);
    const tabId = `${dealId}-${kind}`;
    setTabs(ts => {
      if (ts.some(t => t.id === tabId)) return ts;
      return [...ts, {
        id: tabId,
        kind,
        label: `${deal ? deal.name : 'Portfolio'} · ${window.CARD_LABEL[kind] || kind}`,
        deal,
      }];
    });
    setActiveTabId(tabId);
    setWorkHidden(false);
  };

  const closeTab = id => {
    setTabs(ts => {
      const next = ts.filter(t => t.id !== id);
      if (activeTabId === id && next.length) setActiveTabId(next[next.length - 1].id);
      return next;
    });
  };

  const handleSend = text => {
    setMessages(m => [...m, { who: 'me', text }]);
    setTyping(true);
    setTimeout(() => {
      const reply = window.yuliaReply(text, activeDeal);
      setTyping(false);
      setMessages(m => [...m, { who: 'y', text: reply.text, cards: reply.cards }]);
      /* Auto-open artifact */
      if (reply.cards && reply.cards[0] && activeDeal) {
        openArtifact(activeDeal.id, reply.cards[0]);
      } else if (reply.cards && reply.cards.includes('compare')) {
        openArtifact('compare', 'compare');
      }
    }, 900);
  };

  return (
    <div className="host" data-density={state.density}>
      <div className="host__bar">
        <div className="host__brand">smbx.ai <span>· internal</span></div>
        <div className="host__toggle">
          <button className={state.mode === 'desktop' ? 'active' : ''} onClick={() => set({ mode: 'desktop' })}>Desktop</button>
          <button className={state.mode === 'mobile' ? 'active' : ''} onClick={() => set({ mode: 'mobile' })}>Mobile</button>
        </div>
        <div style={{ width: 120, textAlign: 'right', fontSize: 11, color: '#9A9A9F', fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.08em' }}>
          {state.mode === 'desktop' ? 'CLAUDE-STYLE' : 'APP STORE'}
        </div>
      </div>

      <div className="host__stage">
        {state.mode === 'desktop' ? (() => {
          const chatVisible = state.chatShown && !tooNarrowForChat;
          const canvasVisible = state.canvasShown;
          const workVisible = !workHidden && !tooNarrowForWork;
          return (
          <div
            className="app"
            data-rail={state.rail}
            data-chat={chatVisible ? 'shown' : 'hidden'}
            data-canvas={canvasVisible ? 'shown' : 'hidden'}
            data-work={workVisible ? (state.workWidth === 'wide' ? 'wide' : 'normal') : 'hidden'}
          >
            <LeftRail
              collapsed={state.rail === 'collapsed'}
              onToggle={() => set({ rail: state.rail === 'collapsed' ? 'expanded' : 'collapsed' })}
              activeDealId={activeId}
              onSelectDeal={handleSelectDeal}
              activeStage={activeStage}
              onSelectStage={setActiveStage}
              onNewChat={handleNewChat}
            />
            {chatVisible ? (
              <ChatPane
                activeId={activeId}
                deal={activeDeal}
                messages={messages}
                onSend={handleSend}
                isTyping={typing}
                onOpenArtifact={openArtifact}
                onTogglePane={() => setWorkHidden(v => !v)}
                paneHidden={workHidden}
                onCollapse={() => set({ chatShown: false })}
              />
            ) : (
              <button
                className="pane-stub"
                onClick={() => {
                  if (tooNarrowForChat) return;
                  set({ chatShown: true });
                }}
                title={tooNarrowForChat ? 'Viewport too narrow for chat' : 'Expand chat'}
              >
                <span>Chat</span>
              </button>
            )}
            {canvasVisible ? (
              <CanvasPane deal={activeDeal} onCollapse={() => set({ canvasShown: false })} />
            ) : (
              <button className="pane-stub" onClick={() => set({ canvasShown: true })} title="Expand canvas">
                <span>Canvas</span>
              </button>
            )}
            {workVisible ? (
              <WorkPane
                tabs={tabs}
                activeTabId={activeTabId}
                onSwitch={setActiveTabId}
                onClose={closeTab}
                paneWide={state.workWidth === 'wide'}
                onToggleWide={() => set({ workWidth: state.workWidth === 'wide' ? 'normal' : 'wide' })}
                onClose2={() => setWorkHidden(true)}
              />
            ) : (
              <button
                className="pane-stub pane-stub--work"
                onClick={() => {
                  if (tooNarrowForWork) return;
                  setWorkHidden(false);
                }}
                title={tooNarrowForWork ? 'Viewport too narrow for workbench' : 'Expand workbench'}
              >
                <span>Workbench</span>
              </button>
            )}
          </div>
          );
        })() : (
          <div className="mobile-host">
            <MobileApp browseMode={state.browseMode} />
          </div>
        )}
      </div>

      {tweaksOpen && (
        <div className="tweaks">
          <div className="tweaks__head">
            <div className="tweaks__t">Tweaks</div>
            <button className="tweaks__x" onClick={() => setTweaksOpen(false)}>×</button>
          </div>
          <div className="tweaks__body">
            <div className="tweaks__row">
              <div className="tweaks__lbl">Mode</div>
              <div className="tweaks__seg">
                <button className={state.mode === 'desktop' ? 'active' : ''} onClick={() => set({ mode: 'desktop' })}>Desktop</button>
                <button className={state.mode === 'mobile' ? 'active' : ''} onClick={() => set({ mode: 'mobile' })}>Mobile</button>
              </div>
            </div>
            {state.mode === 'desktop' && <>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Sidebar</div>
                <div className="tweaks__seg">
                  <button className={state.rail === 'expanded' ? 'active' : ''} onClick={() => set({ rail: 'expanded' })}>Expanded</button>
                  <button className={state.rail === 'collapsed' ? 'active' : ''} onClick={() => set({ rail: 'collapsed' })}>Collapsed</button>
                </div>
              </div>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Density</div>
                <div className="tweaks__seg">
                  <button className={state.density === 'comfortable' ? 'active' : ''} onClick={() => set({ density: 'comfortable' })}>Comfortable</button>
                  <button className={state.density === 'compact' ? 'active' : ''} onClick={() => set({ density: 'compact' })}>Compact</button>
                </div>
              </div>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Workbench</div>
                <div className="tweaks__seg">
                  <button className={state.workWidth === 'normal' ? 'active' : ''} onClick={() => set({ workWidth: 'normal' })}>Normal</button>
                  <button className={state.workWidth === 'wide' ? 'active' : ''} onClick={() => set({ workWidth: 'wide' })}>Wide</button>
                </div>
              </div>
            </>}
            {state.mode === 'mobile' && (
              <div className="tweaks__row">
                <div className="tweaks__lbl">Deals tab</div>
                <div className="tweaks__seg">
                  <button className={!state.browseMode ? 'active' : ''} onClick={() => set({ browseMode: false })}>Feed</button>
                  <button className={state.browseMode ? 'active' : ''} onClick={() => set({ browseMode: true })}>Browse</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
