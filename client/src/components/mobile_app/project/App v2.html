<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>smbx.ai · internal app</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css?v=4" />
<link rel="stylesheet" href="tabs.css?v=1" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="cards.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="canvas.jsx"></script>
<script type="text/babel" src="tabs.jsx"></script>
<script type="text/babel" src="dealbar.jsx"></script>
<script type="text/babel" src="workspace.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>

<script type="text/babel">
/* ═══════════════════════════════════════════════════════════
   smbx v2 — Portfolio → Dia-style tabs → Workspace + Chat
   ═══════════════════════════════════════════════════════════ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "desktop",
  "dealbar": "expanded",
  "density": "comfortable",
  "chatShown": true,
  "tabPlacement": "left-sidebar",
  "browseMode": false
}/*EDITMODE-END*/;

function loadState() {
  try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('smbx-app-v2') || '{}') }; }
  catch { return TWEAK_DEFAULTS; }
}
function saveState(s) { try { localStorage.setItem('smbx-app-v2', JSON.stringify(s)); } catch {} }

/* Persisted tab session */
function loadTabSession() {
  try {
    const s = JSON.parse(localStorage.getItem('smbx-tabs-v2') || 'null');
    if (s && s.tabs) return s;
  } catch {}
  return {
    portfolioId: 'fund1',
    tabs: [
      { id: 'atlas-deal', kind: 'deal', dealId: 'atlas', label: 'Atlas Air', sub: 'DD IN PROGRESS' },
      { id: 'benchmark-loi', kind: 'loi', dealId: 'benchmark', label: 'Benchmark · LOI' },
      { id: 'compare-3', kind: 'compare', dealIds: ['atlas', 'summit', 'benchmark'], label: 'Compare · Atlas + Summit + Benchmark' },
    ],
    activeTabId: 'atlas-deal',
  };
}
function saveTabSession(s) { try { localStorage.setItem('smbx-tabs-v2', JSON.stringify(s)); } catch {} }

function App() {
  const [state, setState] = React.useState(loadState);
  const set = patch => setState(s => { const n = { ...s, ...patch }; saveState(n); return n; });

  const [session, setSession] = React.useState(loadTabSession);
  const updateSession = patch => setSession(s => { const n = { ...s, ...patch }; saveTabSession(n); return n; });

  const portfolio = React.useMemo(
    () => window.PORTFOLIOS.find(p => p.id === session.portfolioId) || window.PORTFOLIOS[0],
    [session.portfolioId]
  );

  const activeTab = session.tabs.find(t => t.id === session.activeTabId) || null;

  /* Viewport */
  const [vw, setVw] = React.useState(() => window.innerWidth);
  React.useEffect(() => {
    const onR = () => setVw(window.innerWidth);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  const tooNarrowForChat = vw < 1040;

  /* Chat state — per active tab */
  const seedMessages = (tab) => {
    if (!tab) return [{ who: 'y', text: `Hi — this is <strong>${portfolio.name}</strong>. Ask me anything across your ${portfolio.dealIds.length} deals, or open one to drill in.`, cards: null }];
    if (tab.kind === 'compare') {
      const deals = (tab.dealIds || []).map(id => window.DEALS.find(d => d.id === id)).filter(Boolean);
      return [{ who: 'y', text: `Comparing <strong>${deals.map(d => d.name).join(', ')}</strong>. Switch between side-by-side, overlay, and table views above. Ask me to rank, sensitize, or model any of them.`, cards: null }];
    }
    if (tab.kind === 'portfolio') {
      return [{ who: 'y', text: `<strong>${portfolio.name}</strong> overview. ${portfolio.dealIds.length} deals, stage breakdown to your right. What do you want to dig into?`, cards: null }];
    }
    if (tab.kind === 'model' && tab.dealId) {
      const deal = window.DEALS.find(d => d.id === tab.dealId);
      return [{ who: 'y', text: `DCF on <strong>${deal.name}</strong>. Base case at 9% growth, 11% WACC, 2.5% terminal. Adjust assumptions and I'll reflow.`, cards: null }];
    }
    if (tab.kind === 'scratch') {
      return [{ who: 'y', text: `Scratchpad open. Ask me anything — results land here without cluttering your tabs.`, cards: null }];
    }
    return window.CHAT_SEEDS[tab.dealId] || [{ who: 'y', text: `Opened <strong>${tab.label}</strong>. What do you want to work on?`, cards: null }];
  };

  const [messagesByTab, setMessagesByTab] = React.useState(() => {
    const init = {};
    session.tabs.forEach(t => { init[t.id] = seedMessages(t); });
    init['__global__'] = [{ who: 'y', text: `Hi — this is <strong>${portfolio.name}</strong>. Ask me anything across your ${portfolio.dealIds.length} deals, or open one on the left to drill in.`, cards: null }];
    return init;
  });
  const [typing, setTyping] = React.useState(false);

  const currentMessages = activeTab ? (messagesByTab[activeTab.id] || []) : (messagesByTab['__global__'] || []);
  const currentKey = activeTab ? activeTab.id : '__global__';

  /* Tab operations */
  const openTab = (spec) => {
    /* spec: { kind, dealId?, dealIds?, label, sub? } */
    const id = spec.id || `${spec.kind}-${spec.dealId || (spec.dealIds || []).join('_') || Date.now()}`;
    setSession(s => {
      if (s.tabs.some(t => t.id === id)) {
        return { ...s, activeTabId: id };
      }
      const nt = { ...spec, id };
      const next = { ...s, tabs: [...s.tabs, nt], activeTabId: id };
      saveTabSession(next);
      return next;
    });
    setMessagesByTab(m => m[id] ? m : ({ ...m, [id]: seedMessages({ ...spec, id }) }));
    return id;
  };

  const switchTab = (id) => {
    updateSession({ activeTabId: id });
  };

  const closeTab = (id) => {
    setSession(s => {
      const next = s.tabs.filter(t => t.id !== id);
      const newActive = s.activeTabId === id
        ? (next.length ? next[Math.max(0, next.length - 1)].id : null)
        : s.activeTabId;
      const nextS = { ...s, tabs: next, activeTabId: newActive };
      saveTabSession(nextS);
      return nextS;
    });
    setMessagesByTab(m => { const n = { ...m }; delete n[id]; return n; });
  };

  const reorderTabs = (draggedId, overId) => {
    setSession(s => {
      const from = s.tabs.findIndex(t => t.id === draggedId);
      const to = s.tabs.findIndex(t => t.id === overId);
      if (from < 0 || to < 0 || from === to) return s;
      const next = s.tabs.slice();
      const [m] = next.splice(from, 1);
      next.splice(to, 0, m);
      const nextS = { ...s, tabs: next };
      saveTabSession(nextS);
      return nextS;
    });
  };

  const changePortfolio = (pid) => {
    updateSession({ portfolioId: pid });
    /* Filter out tabs whose deals aren't in this portfolio */
    const port = window.PORTFOLIOS.find(p => p.id === pid);
    setSession(s => {
      const keep = s.tabs.filter(t => !t.dealId || port.dealIds.includes(t.dealId));
      const nextS = { ...s, portfolioId: pid, tabs: keep, activeTabId: keep.some(t => t.id === s.activeTabId) ? s.activeTabId : (keep[0] && keep[0].id) || null };
      saveTabSession(nextS);
      return nextS;
    });
  };

  /* Yulia send */
  const handleSend = (text) => {
    const key = currentKey;
    setMessagesByTab(m => ({ ...m, [key]: [...(m[key] || []), { who: 'me', text }] }));
    setTyping(true);
    setTimeout(() => {
      const deal = activeTab && activeTab.dealId ? window.DEALS.find(d => d.id === activeTab.dealId) : null;
      const reply = window.yuliaReply(text, deal, portfolio);
      setTyping(false);
      const replyMsg = { who: 'y', text: reply.text, cards: reply.cards, progress: reply.progress, spawnTabs: reply.spawnTabs };
      setMessagesByTab(m => ({ ...m, [key]: [...(m[key] || []), replyMsg] }));
      /* Auto-spawn tabs if Yulia asked to */
      if (reply.spawnTabs) {
        reply.spawnTabs.forEach((sp, i) => {
          setTimeout(() => {
            openTab(sp);
          }, 250 + i * 200);
        });
      } else if (reply.cards && reply.cards[0]) {
        /* Single card — offer as clickable tab spawn (handled by Msg UI) */
      }
    }, 800);
  };

  const openArtifactFromChat = (spec) => {
    openTab(spec);
  };

  /* Edit mode */
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  React.useEffect(() => {
    const onMsg = e => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  return (
    <div className="host" data-density={state.density}>
      <div className="host__bar">
        <div className="host__brand">smbx.ai <span>· internal</span></div>
        <div className="host__toggle">
          <button className={state.mode === 'desktop' ? 'active' : ''} onClick={() => set({ mode: 'desktop' })}>Desktop</button>
          <button className={state.mode === 'mobile' ? 'active' : ''} onClick={() => set({ mode: 'mobile' })}>Mobile</button>
        </div>
        <div style={{ width: 160, textAlign: 'right', fontSize: 11, color: '#9A9A9F', fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.08em' }}>
          {state.mode === 'desktop' ? 'TABBED · DIA-LIKE' : 'APP STORE'}
        </div>
      </div>

      <div className="host__stage">
        {state.mode === 'desktop' ? (
          <div
            className="app2"
            data-dealbar={state.dealbar}
            data-chat={state.chatShown && !tooNarrowForChat ? 'shown' : 'hidden'}
            data-placement={state.tabPlacement}
          >
            <Dealbar
              portfolio={portfolio}
              onPortfolioChange={changePortfolio}
              tabs={session.tabs}
              activeTabId={session.activeTabId}
              onSwitchTab={switchTab}
              onCloseTab={closeTab}
              onReorderTabs={reorderTabs}
              onOpenTab={openTab}
              collapsed={state.dealbar === 'collapsed'}
              onToggleCollapse={() => set({ dealbar: state.dealbar === 'collapsed' ? 'expanded' : 'collapsed' })}
            />

            <Workspace
              tab={activeTab}
              portfolio={portfolio}
              onOpenTab={openTab}
            />

            {state.chatShown && !tooNarrowForChat ? (
              <ChatPane
                portfolio={portfolio}
                activeTab={activeTab}
                messages={currentMessages}
                onSend={handleSend}
                isTyping={typing}
                onOpenArtifact={openArtifactFromChat}
                onCollapse={() => set({ chatShown: false })}
              />
            ) : (
              <button
                className="pane-stub"
                onClick={() => { if (!tooNarrowForChat) set({ chatShown: true }); }}
                title={tooNarrowForChat ? 'Viewport too narrow for chat' : 'Expand chat'}
              >
                <span>Chat</span>
              </button>
            )}
          </div>
        ) : (
          <div className="mobile-host">
            <MobileApp browseMode={state.browseMode} />
          </div>
        )}
      </div>

      {tweaksOpen && (
        <div className="tweaks">
          <div className="tweaks__head">
            <div className="tweaks__t">Tweaks</div>
            <button className="tweaks__x" onClick={() => setTweaksOpen(false)}>×</button>
          </div>
          <div className="tweaks__body">
            <div className="tweaks__row">
              <div className="tweaks__lbl">Mode</div>
              <div className="tweaks__seg">
                <button className={state.mode === 'desktop' ? 'active' : ''} onClick={() => set({ mode: 'desktop' })}>Desktop</button>
                <button className={state.mode === 'mobile' ? 'active' : ''} onClick={() => set({ mode: 'mobile' })}>Mobile</button>
              </div>
            </div>
            {state.mode === 'desktop' && <>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Tab placement</div>
                <div className="tweaks__seg tweaks__seg--stack">
                  <button className={state.tabPlacement === 'left-sidebar' ? 'active' : ''} onClick={() => set({ tabPlacement: 'left-sidebar' })}>Left sidebar (Dia)</button>
                  <button className={state.tabPlacement === 'top-bar' ? 'active' : ''} onClick={() => set({ tabPlacement: 'top-bar' })}>Horizontal top bar</button>
                  <button className={state.tabPlacement === 'icons-only' ? 'active' : ''} onClick={() => set({ tabPlacement: 'icons-only' })}>Icons-only strip</button>
                </div>
              </div>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Dealbar</div>
                <div className="tweaks__seg">
                  <button className={state.dealbar === 'expanded' ? 'active' : ''} onClick={() => set({ dealbar: 'expanded' })}>Expanded</button>
                  <button className={state.dealbar === 'collapsed' ? 'active' : ''} onClick={() => set({ dealbar: 'collapsed' })}>Collapsed</button>
                </div>
              </div>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Density</div>
                <div className="tweaks__seg">
                  <button className={state.density === 'comfortable' ? 'active' : ''} onClick={() => set({ density: 'comfortable' })}>Comfortable</button>
                  <button className={state.density === 'compact' ? 'active' : ''} onClick={() => set({ density: 'compact' })}>Compact</button>
                </div>
              </div>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Chat pane</div>
                <div className="tweaks__seg">
                  <button className={state.chatShown ? 'active' : ''} onClick={() => set({ chatShown: true })}>Shown</button>
                  <button className={!state.chatShown ? 'active' : ''} onClick={() => set({ chatShown: false })}>Hidden</button>
                </div>
              </div>
              <div className="tweaks__row">
                <div className="tweaks__lbl">Session</div>
                <div className="tweaks__seg">
                  <button onClick={() => { localStorage.removeItem('smbx-tabs-v2'); location.reload(); }}>Reset tabs</button>
                </div>
              </div>
            </>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
