    <title>Sell or Buy Any Business, Anywhere — smbx.ai</title>
    <meta name="description" content="AI deal advisory from valuation to close. Sell, buy, raise capital, or integrate. Start free." />
    <meta property="og:title" content="smbx.ai — AI Deal Advisory" />
    <meta property="og:description" content="AI deal advisory from valuation to close. Sell, buy, raise capital, or integrate. Start free." />
    <meta property="og:type" content="website" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f9f9fc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1c1e" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Resolve dark mode before first paint — prevents flash
      // Three states: 'light', 'dark', or null (follow OS)
      (function() {
        var stored = localStorage.getItem('smbx-theme'); // 'light' | 'dark' | null
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || (!stored && systemDark);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
        // Only override theme-color when user has a manual preference
        if (stored) {
          var color = isDark ? '#1a1c1e' : '#f9f9fc';
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          metas.forEach(function(m) { m.setAttribute('content', color); });
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </body>
