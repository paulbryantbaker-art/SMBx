<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="manifest" href="/manifest.json" />
    <title>Sell or Buy Any Business, Anywhere — smbx.ai</title>
    <meta name="description" content="AI deal advisory from valuation to close. Sell, buy, raise capital, or integrate. Start free." />
    <meta property="og:title" content="smbx.ai — AI Deal Advisory" />
    <meta property="og:description" content="AI deal advisory from valuation to close. Sell, buy, raise capital, or integrate. Start free." />
    <meta property="og:type" content="website" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#2A2C2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Resolve dark mode + body color before first paint to prevent any flash
      // and to make the iOS Safari toolbar match the visible page color.
      //
      // Mobile (<=767px): body matches the chat home edge-to-edge.
      //   - Light mode: body is white (#FFFFFF)
      //   - Dark mode:  body is near-black (#151617)
      // Desktop: body is medium charcoal (#2A2C2E) so floating cards float visually.
      (function() {
        var stored = localStorage.getItem('smbx-theme'); // 'light' | 'dark' | null
        var isDark = stored === 'dark';
        var isMobile = window.matchMedia('(max-width: 767px)').matches;

        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }

        var color = isMobile
          ? (isDark ? '#151617' : '#FFFFFF')
          : '#2A2C2E';

        var metas = document.querySelectorAll('meta[name="theme-color"]');
        metas.forEach(function(m) { m.setAttribute('content', color); });

        // Set the body/html bg directly so the very first paint matches.
        document.documentElement.style.backgroundColor = color;
        // Body element doesn't exist yet at this point in the head, so we set it
        // when the body is parsed via a one-shot observer.
        if (document.body) {
          document.body.style.backgroundColor = color;
        } else {
          document.addEventListener('DOMContentLoaded', function() {
            document.body.style.backgroundColor = color;
          });
        }

        // Favicon: dark X for light mode, white X for dark mode
        function setFavicon(dark) {
          var link = document.querySelector('link[rel="icon"]');
          if (link) link.href = dark ? '/X-white.png' : '/X.png';
        }
        setFavicon(isDark);
        window.__setFavicon = setFavicon;
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          if (!localStorage.getItem('smbx-theme')) setFavicon(e.matches);
        });
      })();
    </script>
    <link rel="icon" type="image/png" href="/X.png" />
    <link rel="apple-touch-icon" href="/X.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
