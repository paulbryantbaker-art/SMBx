<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, interactive-widget=resizes-content" />
    <title>Sell or Buy Any Business, Anywhere — smbx.ai</title>
    <meta name="description" content="AI deal advisory from valuation to close. Sell, buy, raise capital, or integrate. Start free." />
    <meta property="og:title" content="smbx.ai — AI Deal Advisory" />
    <meta property="og:description" content="AI deal advisory from valuation to close. Sell, buy, raise capital, or integrate. Start free." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" id="theme-color-light" />
    <meta name="theme-color" content="#1a1c1e" media="(prefers-color-scheme: dark)" id="theme-color-dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <meta name="color-scheme" content="light" />
    <script>
      // Sync dark mode before first paint — prevents flash and sets Safari chrome
      (function() {
        var isDark = localStorage.getItem('smbx-dark') === '1';
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          metas.forEach(function(m) { m.setAttribute('content', '#1a1c1e'); m.removeAttribute('media'); });
          var cs = document.querySelector('meta[name="color-scheme"]');
          if (cs) cs.setAttribute('content', 'dark');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
