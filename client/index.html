<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: restored 2026-05-02 so the app bleeds edge-
         to-edge behind iOS Safari's translucent URL bar / toolbar (App
         Store look). Was previously omitted because it produced a
         visible "chin" in installed PWA — that chin happened when the
         webview extended past body and html bg didn't match. Compensated
         here by matching html bg to mobile's --mb-bg (#FFFFFF) at runtime
         in V6Mobile, and by safe-area-inset padding on every chrome
         element (TopBar spacer, TabBar bottom, mobile-root paddingBottom).
         If you ever see a colored seam at the bottom in PWA again, check
         html bg + theme-color first. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, interactive-widget=resizes-content, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <title>smbx.ai — M&amp;A workspace</title>
    <meta name="description" content="Yulia is the deal team you hire. M&amp;A deal work end-to-end — recasts, baselines, buyer lists, IOIs. $149/mo flat. No success fees, ever." />
    <meta property="og:title" content="smbx.ai — M&amp;A workspace" />
    <meta property="og:description" content="Yulia is the deal team you hire. M&amp;A deal work end-to-end. $149/mo flat. No success fees, ever." />
    <meta property="og:type" content="website" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F6F7F9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      // Set body bg synchronously before first paint:
      //  - Desktop V6: #F6F7F9 (slate, avoids white flash)
      //  - Mobile: #D4A258 (warm gold sunrise) so iOS Safari samples it
      //    AT INITIAL PAINT and the chrome stays translucent + warm-tinted.
      //    Critical: do NOT change body bg via JS later — once iOS sees
      //    a JS-driven post-paint bg change, the chrome locks out of
      //    translucent mode into opaque-tinted, killing the page-bleed
      //    behind the status bar. V6Mobile.tsx must NOT touch body bg.
      (function() {
        var isMobile = window.matchMedia && window.matchMedia('(max-width: 767px)').matches;
        // Mobile body bg is gold (#D4A258) at initial paint so iOS Safari's
        // opaque-tinted chrome blends with the home gradient's gold sunrise
        // at scroll=0. As the user scrolls past the gradient's gold band,
        // V6Mobile.tsx adds html.mobile-past-gold which flips body to white
        // via a CSS !important rule — chrome follows. Detail pages get
        // html.mobile-detail (white). Class-based bg changes (vs body
        // inline-style writes) don't trigger iOS's chrome-translucency lock.
        var bg = isMobile ? '#D4A258' : '#F6F7F9';
        document.documentElement.style.backgroundColor = bg;
        if (document.body) document.body.style.backgroundColor = bg;
        else document.addEventListener('DOMContentLoaded', function() {
          document.body.style.backgroundColor = bg;
        });
      })();
    </script>
    <!-- Site-wide Organization + SoftwareApplication schema. Per-page
         FAQPage / BreadcrumbList are injected by usePageMeta. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://smbx.ai/#organization",
          "name": "smbx.ai",
          "url": "https://smbx.ai/",
          "logo": "https://smbx.ai/G3L.png",
          "description": "AI deal intelligence for business acquisitions, sales, capital raises, and post-merger integration."
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://smbx.ai/#software",
          "name": "smbx.ai",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "Chat-first M&A deal intelligence platform. Sell, buy, raise capital, or integrate — guided end-to-end by Yulia, an AI deal advisor.",
          "offers": {
            "@type": "AggregateOffer",
            "priceCurrency": "USD",
            "lowPrice": "0",
            "highPrice": "999",
            "offerCount": "4"
          },
          "provider": { "@id": "https://smbx.ai/#organization" }
        }
      ]
    }
    </script>
    <link rel="icon" type="image/png" href="/X.png" />
    <!-- PWA icon: dark variant (white X on near-black) — works best on
         dark home screens which are the majority. iOS PWAs don't support
         light/dark icon switching; this is set at install time.
         Light variant (pwa-icon-180.png) exists for future use. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icon-180-dark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- V3 fonts: Inter Tight = display, Inter = body, JetBrains Mono = data/microlabels. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
