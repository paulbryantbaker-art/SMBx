<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- NOTE on viewport-fit: Grok/ChatGPT PWAs deliberately OMIT
         `viewport-fit=cover`. Without it, iOS sizes the webview to the
         visible area and paints the status-bar + home-indicator safe
         regions with `theme-color` automatically — no visible "chin."
         With cover, the webview extends edge-to-edge and html bg fills
         safe areas; any mismatch shows as a seam. We match the Grok
         approach. If ever re-enabling cover, compensate with explicit
         safe-area padding everywhere content ends. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, interactive-widget=resizes-content" />
    <link rel="manifest" href="/manifest.json" />
    <title>smbx.ai — M&amp;A workspace</title>
    <meta name="description" content="Yulia is the deal team you hire. M&amp;A deal work end-to-end — recasts, baselines, buyer lists, IOIs. $149/mo flat. No success fees, ever." />
    <meta property="og:title" content="smbx.ai — M&amp;A workspace" />
    <meta property="og:description" content="Yulia is the deal team you hire. M&amp;A deal work end-to-end. $149/mo flat. No success fees, ever." />
    <meta property="og:type" content="website" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F6F7F9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      // V3: light-only. Set body bg before first paint to avoid any flash.
      document.documentElement.style.backgroundColor = '#F6F7F9';
      if (document.body) document.body.style.backgroundColor = '#F6F7F9';
      else document.addEventListener('DOMContentLoaded', function() {
        document.body.style.backgroundColor = '#F6F7F9';
      });
    </script>
    <!-- Site-wide Organization + SoftwareApplication schema. Per-page
         FAQPage / BreadcrumbList are injected by usePageMeta. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://smbx.ai/#organization",
          "name": "smbx.ai",
          "url": "https://smbx.ai/",
          "logo": "https://smbx.ai/G3L.png",
          "description": "AI deal intelligence for business acquisitions, sales, capital raises, and post-merger integration."
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://smbx.ai/#software",
          "name": "smbx.ai",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "Chat-first M&A deal intelligence platform. Sell, buy, raise capital, or integrate — guided end-to-end by Yulia, an AI deal advisor.",
          "offers": {
            "@type": "AggregateOffer",
            "priceCurrency": "USD",
            "lowPrice": "0",
            "highPrice": "999",
            "offerCount": "4"
          },
          "provider": { "@id": "https://smbx.ai/#organization" }
        }
      ]
    }
    </script>
    <link rel="icon" type="image/png" href="/X.png" />
    <!-- PWA icon: dark variant (white X on near-black) — works best on
         dark home screens which are the majority. iOS PWAs don't support
         light/dark icon switching; this is set at install time.
         Light variant (pwa-icon-180.png) exists for future use. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icon-180-dark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- V3 fonts: Inter Tight = display, Inter = body, JetBrains Mono = data/microlabels. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
