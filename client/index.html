    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Resolve dark mode + body color before first paint to prevent any flash
      // and to make the iOS Safari toolbar (and PWA chin / home-indicator
      // area, which iOS fills with theme-color) match the visible page.
      //
      // Mobile (<=767px): body matches Glass Grok's app canvas edge-to-edge.
      //   - Light mode: #F2F2F4 (--bg-app — matches internal app + marketing)
      //   - Dark mode:  #151617 (near-black)
      // Desktop: body is medium charcoal (#2A2C2E) so floating cards float.
      //
      // Prior value #FFFFFF produced a visible white chin below the tab bar
      // in the iOS PWA — the theme-color + inline body bg overrode the
      // @media(display-mode: standalone) rule that otherwise paints #F2F2F4.
      (function() {
        var stored = localStorage.getItem('smbx-theme'); // 'light' | 'dark' | null
        var isDark = stored === 'dark';
        var isMobile = window.matchMedia('(max-width: 767px)').matches;

        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }

        var color = isMobile
          ? (isDark ? '#151617' : '#F2F2F4')
          : '#2A2C2E';

        var metas = document.querySelectorAll('meta[name="theme-color"]');
        metas.forEach(function(m) { m.setAttribute('content', color); });

        // Set the body/html bg directly so the very first paint matches.
        document.documentElement.style.backgroundColor = color;
        // Body element doesn't exist yet at this point in the head, so we set it
        // when the body is parsed via a one-shot observer.
        if (document.body) {
          document.body.style.backgroundColor = color;
        } else {
          document.addEventListener('DOMContentLoaded', function() {
            document.body.style.backgroundColor = color;
          });
        }

        // Favicon: dark X for light mode, white X for dark mode
        function setFavicon(dark) {
          var link = document.querySelector('link[rel="icon"]');
          if (link) link.href = dark ? '/X-white.png' : '/X.png';
        }
        setFavicon(isDark);
        window.__setFavicon = setFavicon;
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          if (!localStorage.getItem('smbx-theme')) setFavicon(e.matches);
        });
      })();
    </script>
