<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile iOS — Yulia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mobile-styles.css">
<style>
  body { background: #E5E7EB; }
  .stage-bg { background: #E8EAEE; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mobile-primitives.jsx"></script>
<script type="text/babel" src="glass-primitives.jsx"></script>
<script type="text/babel" src="screen-today.jsx"></script>
<script type="text/babel" src="screen-today-glass.jsx"></script>
<script type="text/babel" src="screen-detail.jsx"></script>
<script type="text/babel" src="screen-pipeline.jsx"></script>

<script type="text/babel" data-presets="env,react">
function Phone({ children, activeTab = 'today', glass = false }) {
  const Tabs = glass ? TabBar2 : TabBar;
  return (
    <div style={{ position: 'relative', width: 402, height: 874 }}>
      <IOSDevice>{children}</IOSDevice>
      <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', borderRadius: 48, overflow: 'hidden' }}>
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, pointerEvents: 'auto' }}>
          <Tabs active={activeTab}/>
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="Mobile iOS — Yulia"
      subtitle="App Store visual language · 5 screens"
      bg="stage-bg"
    >
      <DCSection id="primary" title="Primary flow" subtitle="App Store homepage pattern adapted for deal flow">
        <DCArtboard id="today" label="Today · hero deal verdict" width={402} height={874}>
          <Phone activeTab="today"><TodayScreen/></Phone>
        </DCArtboard>
        <DCArtboard id="pipeline" label="Pipeline · category chips + featured" width={402} height={874}>
          <Phone activeTab="pipeline"><PipelineScreen/></Phone>
        </DCArtboard>
        <DCArtboard id="brief" label="Brief · today's 3 picks" width={402} height={874}>
          <Phone activeTab="brief"><BriefScreen/></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="detail" title="Deal detail" subtitle="App-detail page pattern: big icon, stats strip, what's new, closer look, ratings">
        <DCArtboard id="detail" label="Deal detail · App Store style" width={402} height={874}>
          <Phone activeTab="today"><DetailScreen/></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="glass" title="Liquid Glass v2" subtitle="iOS 26 chrome — translucent top bar, floating glass tab bar, on-color glass cells">
        <DCArtboard id="today-glass" label="Today · liquid glass" width={402} height={874}>
          <Phone activeTab="today" glass><TodayScreen2/></Phone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
