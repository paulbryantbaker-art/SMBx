name: Smoke Tests
# Disabled: e2e tests require a running server + database + API keys.
# Re-enable when CI environment is configured with test database and secrets.
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx playwright test
