<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>How it works & pricing — smbX</title>

  <!-- Fonts: Inter + Inter Tight + JetBrains Mono. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- V3 design system tokens (see how.css) -->
  <link rel="stylesheet" href="how.css">

  <!-- React 18 + Babel for inline JSX -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* When the page is rendered standalone (not inside the chat shell)
       the body needs to be scrollable. Override the V3 default. */
    html, body { overflow: auto; }
    body { background: var(--bg); }

    /* Document chrome — gives the doc the "tab" feel it has inside the app. */
    .doc-shell {
      max-width: 1080px;
      margin: 32px auto 96px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 1px 0 rgba(15,22,35,0.02), 0 12px 32px -16px rgba(15,22,35,0.08);
    }
    .doc-shell-head {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      border-radius: 10px 10px 0 0;
    }
    .doc-shell-head .dot {
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--accent);
    }
    .doc-shell-head .label {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
  </style>
</head>
<body>
  <div class="doc-shell">
    <div class="doc-shell-head">
      <span class="dot"></span>
      <span class="label">how it works &amp; pricing</span>
    </div>
    <div id="root"></div>
  </div>

  <!-- The page itself. JSX, no build step required. -->
  <script type="text/babel" src="how.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<LearnDoc />);
  </script>
</body>
</html>
